name: Frontend CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: './media/package-lock.json'
    
    - name: Install dependencies
      working-directory: ./media
      run: npm ci
    
    - name: Run ESLint
      working-directory: ./media
      run: npm run lint
    
    - name: Run tests
      working-directory: ./media
      run: npm test
      continue-on-error: true
    
    
    - name: Build Docker image
      run: docker build -t frontend:test .
